name: Python, recursive loop, and RL smoke

on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout python_mini_metro
        uses: actions/checkout@v4
        with:
          path: python_mini_metro
          persist-credentials: false

      - name: Checkout isolated pinned civ-engine
        uses: actions/checkout@v4
        with:
          repository: yanfengliu/civ-engine
          ref: e0cb614a516c449159a4562c2ac45bd40bffd3df
          path: python_mini_metro/.civ-engine-pin
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: python_mini_metro/package-lock.json

      - name: Build pinned civ-engine
        working-directory: python_mini_metro/.civ-engine-pin
        run: |
          npm ci
          npm run build

      - name: Install recursive-loop dependency
        working-directory: python_mini_metro
        run: npm ci --omit=dev

      - name: Verify isolated civ-engine provenance
        working-directory: python_mini_metro
        run: >-
          node --input-type=module -e "import { assertCivEngineStateAllowed, captureCivEngineState } from './scripts/source-provenance-engine.mjs'; const state = await captureCivEngineState({ repoRoot: process.cwd() }); assertCivEngineStateAllowed(state)"

      - name: Install hash-pinned Python dependencies
        working-directory: python_mini_metro
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-locked.txt

      - name: Run recursive-loop contract tests
        working-directory: python_mini_metro
        run: npm test

      - name: Run clean default recursive pass
        working-directory: python_mini_metro
        run: npm run playtest:recursive

      - name: Run Python unit tests
        working-directory: python_mini_metro
        run: python -m unittest -v

  rl-smoke:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout python_mini_metro
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Install hash-pinned RL dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-rl-locked.txt

      - name: Run RL contract and library smoke tests
        run: python -m unittest -v test.test_player_env test.test_rl_demonstrator test.test_rl_artifacts test.test_rl_cli test.test_rl_evaluation test.test_rl_history test.test_rl_history_cli test.test_rl_history_integration test.test_rl_legacy_compat test.test_rl_manifest test.test_rl_protocol test.test_rl_resource_profile test.test_rl_resource_profile_cli test.test_rl_resource_profile_integration test.test_rl_temporal_history test.test_rl_training test.test_rl_windows_api test.test_rl_windows_resources

      - name: Run recurrent history and legacy PPO smoke
        run: |
          python scripts/train_rl.py --total-timesteps 256 --n-envs 2 --max-episode-steps 4 --checkpoint-every 128 --eval-every 128 --eval-episodes 1 --device cpu --run-dir output/rl/ci-smoke
          python scripts/evaluate_rl.py output/rl/ci-smoke/final_model.zip --episodes 1 --device cpu --output output/rl/ci-smoke/evaluation-ci.json
          python scripts/train_rl.py --resume output/rl/ci-smoke/final_model.zip --run-dir output/rl/ci-resumed --total-timesteps 128 --seed 77 --n-envs 2 --max-episode-steps 4 --checkpoint-every 128 --eval-every 128 --eval-episodes 1 --device cpu
          python scripts/evaluate_rl.py output/rl/ci-resumed/final_model.zip --episodes 1 --device cpu --output output/rl/ci-resumed/evaluation-ci.json

          python scripts/train_rl.py --history-layout decision-history-v1 --total-timesteps 128 --seed 222 --n-envs 2 --max-episode-steps 4 --checkpoint-every 128 --eval-every 128 --eval-episodes 1 --device cpu --run-dir output/rl/ci-multiscale
          python scripts/evaluate_rl.py output/rl/ci-multiscale/final_model.zip --episodes 1 --device cpu --output output/rl/ci-multiscale/evaluation-ci.json
          python scripts/train_rl.py --resume output/rl/ci-multiscale/final_model.zip --run-dir output/rl/ci-multiscale-resumed --total-timesteps 128 --seed 223 --n-envs 2 --max-episode-steps 4 --checkpoint-every 128 --eval-every 128 --eval-episodes 1 --device cpu
          python scripts/evaluate_rl.py output/rl/ci-multiscale-resumed/final_model.zip --episodes 1 --device cpu --output output/rl/ci-multiscale-resumed/evaluation-ci.json

          python scripts/train_rl.py --algorithm ppo --frame-stack 4 --total-timesteps 128 --seed 123 --n-envs 1 --max-episode-steps 4 --checkpoint-every 128 --eval-every 128 --eval-episodes 1 --device cpu --run-dir output/rl/ci-legacy-ppo
          python scripts/evaluate_rl.py output/rl/ci-legacy-ppo/final_model.zip --episodes 1 --device cpu --output output/rl/ci-legacy-ppo/evaluation-ci.json
          python scripts/train_rl.py --resume output/rl/ci-legacy-ppo/final_model.zip --run-dir output/rl/ci-legacy-ppo-resumed --total-timesteps 128 --seed 88 --n-envs 1 --max-episode-steps 4 --checkpoint-every 128 --eval-every 128 --eval-episodes 1 --device cpu
          python scripts/evaluate_rl.py output/rl/ci-legacy-ppo-resumed/final_model.zip --episodes 1 --device cpu --output output/rl/ci-legacy-ppo-resumed/evaluation-ci.json

          $freshManifest = Get-Content -Raw output/rl/ci-smoke/training-manifest.json | ConvertFrom-Json
          $freshEvaluation = Get-Content -Raw output/rl/ci-smoke/evaluation-ci.json | ConvertFrom-Json
          $resumedManifest = Get-Content -Raw output/rl/ci-resumed/training-manifest.json | ConvertFrom-Json
          $resumedEvaluation = Get-Content -Raw output/rl/ci-resumed/evaluation-ci.json | ConvertFrom-Json
          $promotedHistoryFingerprint = "8c2959aac108ea5b16b977d8fe5e0f9adff795dc2e38a7d233354f28319d3602"
          foreach ($manifest in @($freshManifest, $resumedManifest)) {
            if ($manifest.algorithm -ne "recurrent_ppo" -or $manifest.frameStack -ne 10) { throw "default recurrent algorithm or frame stack mismatch" }
            if ($manifest.history.layout -ne "decision-history-10-fallback-v1" -or ($manifest.history.sampleOffsets -join ",") -ne "128,64,7,6,5,4,3,2,1,0" -or $manifest.historyFingerprint -ne $promotedHistoryFingerprint) { throw "default recurrent history mismatch" }
            if ($manifest.hyperparameters.policy -ne "CnnLstmPolicy" -or $manifest.hyperparameters.lstm_hidden_size -ne 256 -or $manifest.hyperparameters.n_lstm_layers -ne 1 -or $manifest.hyperparameters.batch_size -ne 64) { throw "default recurrent policy, LSTM shape, or batch size mismatch" }
            if ($manifest.hyperparameters.gamma -ne 1.0 -or $manifest.hyperparameters.gae_lambda -ne 0.99) { throw "default recurrent return estimator mismatch" }
          }
          foreach ($evaluation in @($freshEvaluation, $resumedEvaluation)) {
            if ($evaluation.algorithm -ne "recurrent_ppo" -or $evaluation.primaryMetric -ne "meanDeliveries") { throw "default recurrent evaluation contract mismatch" }
            if ($evaluation.history.layout -ne "decision-history-10-fallback-v1" -or $evaluation.historyFingerprint -ne $promotedHistoryFingerprint) { throw "default recurrent evaluation history mismatch" }
            if ($evaluation.horizonTruncatedEpisodes -ne 1 -or $evaluation.gameOverEpisodes -ne 0 -or $evaluation.primaryMetricCensored -ne $true -or $evaluation.primaryMetricComplete -ne $false -or $evaluation.terminationMetadataComplete -ne $true) { throw "default recurrent censoring summary mismatch" }
          }
          if ($freshManifest.seed -ne 42 -or $freshEvaluation.seed -ne 10042 -or $freshEvaluation.episodeMetrics[0].seed -ne 10042) { throw "fresh recurrent seed mismatch" }
          if ($resumedManifest.status -ne "complete") { throw "resumed manifest is not complete" }
          if ($resumedManifest.tags -notcontains "resumed-training") { throw "resumed-training tag is missing" }
          if ([string]::IsNullOrWhiteSpace($resumedManifest.parentManifestSha256) -or [string]::IsNullOrWhiteSpace($resumedManifest.parentModelSha256)) { throw "resumed parent digests are missing" }
          if ($resumedManifest.seed -ne 77 -or $resumedEvaluation.seed -ne 10077 -or $resumedEvaluation.episodeMetrics[0].seed -ne 10077) { throw "resumed recurrent seed mismatch" }

          $multiscaleManifest = Get-Content -Raw output/rl/ci-multiscale/training-manifest.json | ConvertFrom-Json
          $multiscaleEvaluation = Get-Content -Raw output/rl/ci-multiscale/evaluation-ci.json | ConvertFrom-Json
          $multiscaleResumedManifest = Get-Content -Raw output/rl/ci-multiscale-resumed/training-manifest.json | ConvertFrom-Json
          $multiscaleResumedEvaluation = Get-Content -Raw output/rl/ci-multiscale-resumed/evaluation-ci.json | ConvertFrom-Json
          foreach ($manifest in @($multiscaleManifest, $multiscaleResumedManifest)) {
            if ($manifest.algorithm -ne "recurrent_ppo" -or $manifest.frameStack -ne 12 -or $manifest.history.layout -ne "decision-history-v1") { throw "multiscale algorithm or history mismatch" }
            if (($manifest.history.sampleOffsets -join ",") -ne "128,64,32,16,7,6,5,4,3,2,1,0") { throw "multiscale offsets mismatch" }
          }
          foreach ($evaluation in @($multiscaleEvaluation, $multiscaleResumedEvaluation)) {
            if ($evaluation.history.layout -ne "decision-history-v1" -or $evaluation.historyFingerprint -ne $multiscaleManifest.historyFingerprint) { throw "multiscale evaluation history mismatch" }
          }
          if ($multiscaleResumedManifest.historyFingerprint -ne $multiscaleManifest.historyFingerprint -or $multiscaleResumedManifest.tags -notcontains "resumed-training") { throw "multiscale resume identity mismatch" }
          if ([string]::IsNullOrWhiteSpace($multiscaleResumedManifest.parentManifestSha256) -or [string]::IsNullOrWhiteSpace($multiscaleResumedManifest.parentModelSha256)) { throw "multiscale resumed parent digests are missing" }
          if ($multiscaleManifest.seed -ne 222 -or $multiscaleEvaluation.seed -ne 10222 -or $multiscaleResumedManifest.seed -ne 223 -or $multiscaleResumedEvaluation.seed -ne 10223) { throw "multiscale seed mismatch" }

          $legacyManifest = Get-Content -Raw output/rl/ci-legacy-ppo/training-manifest.json | ConvertFrom-Json
          $legacyEvaluation = Get-Content -Raw output/rl/ci-legacy-ppo/evaluation-ci.json | ConvertFrom-Json
          $legacyResumedManifest = Get-Content -Raw output/rl/ci-legacy-ppo-resumed/training-manifest.json | ConvertFrom-Json
          $legacyResumedEvaluation = Get-Content -Raw output/rl/ci-legacy-ppo-resumed/evaluation-ci.json | ConvertFrom-Json
          foreach ($manifest in @($legacyManifest, $legacyResumedManifest)) {
            if ($manifest.algorithm -ne "ppo" -or $manifest.frameStack -ne 4 -or $manifest.hyperparameters.policy -ne "CnnPolicy") { throw "legacy PPO algorithm, frame stack, or policy mismatch" }
            if ($manifest.history.layout -ne "contiguous-history-v1" -or ($manifest.history.sampleOffsets -join ",") -ne "3,2,1,0") { throw "legacy PPO history mismatch" }
          }
          foreach ($evaluation in @($legacyEvaluation, $legacyResumedEvaluation)) {
            if ($evaluation.algorithm -ne "ppo" -or $evaluation.primaryMetric -ne "meanDeliveries") { throw "legacy PPO evaluation contract mismatch" }
            if ($evaluation.history.layout -ne "contiguous-history-v1" -or $evaluation.historyFingerprint -ne $legacyManifest.historyFingerprint) { throw "legacy PPO evaluation history mismatch" }
            if ($evaluation.horizonTruncatedEpisodes -ne 1 -or $evaluation.gameOverEpisodes -ne 0 -or $evaluation.primaryMetricCensored -ne $true -or $evaluation.primaryMetricComplete -ne $false -or $evaluation.terminationMetadataComplete -ne $true) { throw "legacy PPO censoring summary mismatch" }
          }
          if ($legacyManifest.seed -ne 123 -or $legacyEvaluation.seed -ne 10123 -or $legacyEvaluation.episodeMetrics[0].seed -ne 10123) { throw "fresh legacy PPO seed mismatch" }
          if ($legacyResumedManifest.status -ne "complete" -or $legacyResumedManifest.tags -notcontains "resumed-training") { throw "legacy PPO resume contract mismatch" }
          if ($legacyResumedManifest.seed -ne 88 -or $legacyResumedEvaluation.seed -ne 10088 -or $legacyResumedEvaluation.episodeMetrics[0].seed -ne 10088) { throw "resumed legacy PPO seed mismatch" }
